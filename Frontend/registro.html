<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Sistema de Perfiles</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <h1>Registro de Usuario</h1>
            <div id="alert" class="alert"></div>
            <form id="registroForm">
                <div class="form-group">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" placeholder="Elige un nombre de usuario" required>
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="Elige una contraseña" required>
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Confirmar Contraseña</label>
                    <input type="password" id="confirmPassword" placeholder="Repite la contraseña" required>
                </div>
                <div class="btn-group" style="justify-content:center;">
                    <button type="submit" class="btn btn-primary" style="width:100%;">Registrarse</button>
                </div>
            </form>
            <p style="text-align:center;margin-top:1rem;font-size:.9rem;">
                ¿Ya tienes cuenta? <a href="login.html" style="font-weight:600;">Inicia sesión</a>
            </p>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script>
        const form = document.getElementById('registroForm');
        const alertDiv = document.getElementById('alert');

        function showAlert(msg, type) {
            alertDiv.className = 'alert alert-' + type;
            alertDiv.textContent = msg;
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            alertDiv.className = 'alert';

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const confirmPassword = document.getElementById('confirmPassword').value.trim();

            if (!username || !password || !confirmPassword) {
                showAlert('Todos los campos son requeridos.', 'error');
                return;
            }

            if (password.length < 4) {
                showAlert('La contraseña debe tener al menos 4 caracteres.', 'error');
                return;
            }

            if (password !== confirmPassword) {
                showAlert('Las contraseñas no coinciden.', 'error');
                return;
            }

            try {
                const res = await fetch(`${API_BASE}/usuarios/registro`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await res.json();

                if (res.ok || res.status === 201) {
                    showAlert('Registro exitoso. Redirigiendo al login...', 'success');
                    setTimeout(() => window.location.href = 'login.html?registro=ok', 1500);
                } else {
                    showAlert(data.message || 'Error al registrarse.', 'error');
                }
            } catch (err) {
                showAlert('No se pudo conectar con el servidor.', 'error');
            }
        });
    </script>
</body>
</html>
