<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Direcciones - Sistema de Perfiles</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav>
        <span class="brand">Sistema de Perfiles</span>
        <a href="perfiles.html">Perfiles</a>
        <a href="perfil-form.html">Nuevo Perfil</a>
        <a href="direcciones.html" class="active">Direcciones</a>
        <a href="roles.html">Roles</a>
        <a href="usuarios.html">Usuarios</a>
        <a href="login.html">Salir</a>
    </nav>

    <div class="container">
        <h1>Gestión de Direcciones</h1>
        <div id="alert" class="alert"></div>

        <!-- FORMULARIO -->
        <div class="card">
            <h2 id="formTitle">Nueva Dirección</h2>
            <form id="dirForm">
                <input type="hidden" id="editId">
                <div class="form-row">
                    <div class="form-group">
                        <label for="calle">Calle *</label>
                        <input type="text" id="calle" maxlength="100" required>
                    </div>
                    <div class="form-group">
                        <label for="colonia">Colonia</label>
                        <input type="text" id="colonia" maxlength="150">
                    </div>
                </div>
                <div class="form-row-3">
                    <div class="form-group">
                        <label for="numInterior">Num. Interior</label>
                        <input type="text" id="numInterior" maxlength="30">
                    </div>
                    <div class="form-group">
                        <label for="numExterior">Num. Exterior</label>
                        <input type="text" id="numExterior" maxlength="30">
                    </div>
                    <div class="form-group">
                        <label for="municipio">Municipio</label>
                        <input type="text" id="municipio" maxlength="50">
                    </div>
                </div>
                <div class="form-group">
                    <label for="idPerfilUsuario">ID Perfil Usuario</label>
                    <input type="number" id="idPerfilUsuario" min="1">
                </div>
                <div class="btn-group">
                    <button type="submit" class="btn btn-primary" id="submitBtn">Guardar</button>
                    <button type="button" class="btn btn-secondary" onclick="resetForm()">Cancelar</button>
                </div>
            </form>
        </div>

        <!-- TABLA -->
        <div class="card" style="overflow-x:auto;">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Calle</th>
                        <th>Colonia</th>
                        <th>Num Int.</th>
                        <th>Num Ext.</th>
                        <th>Municipio</th>
                        <th>ID Perfil</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="8" style="text-align:center;">Cargando...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script>
        const form = document.getElementById('dirForm');
        const alertDiv = document.getElementById('alert');
        const tableBody = document.getElementById('tableBody');

        function showAlert(msg, type) {
            alertDiv.className = 'alert alert-' + type;
            alertDiv.textContent = msg;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function resetForm() {
            form.reset();
            document.getElementById('editId').value = '';
            document.getElementById('formTitle').textContent = 'Nueva Dirección';
            document.getElementById('submitBtn').textContent = 'Guardar';
        }

        async function loadDirecciones() {
            try {
                const res = await fetch(`${API_BASE}/direcciones`);
                const dirs = await res.json();

                if (dirs.length === 0) {
                    tableBody.innerHTML = '<tr><td colspan="8" style="text-align:center;">Sin direcciones.</td></tr>';
                    return;
                }

                tableBody.innerHTML = dirs.map(d => `
                    <tr>
                        <td>${d.id}</td>
                        <td>${d.calle}</td>
                        <td>${d.colonia || '—'}</td>
                        <td>${d.numInterior || '—'}</td>
                        <td>${d.numExterior || '—'}</td>
                        <td>${d.municipio || '—'}</td>
                        <td>${d.idPerfilUsuario}</td>
                        <td>
                            <button class="btn btn-sm btn-secondary" onclick="editDir(${d.id})">Editar</button>
                            <button class="btn btn-sm btn-danger" onclick="deleteDir(${d.id})">Eliminar</button>
                        </td>
                    </tr>
                `).join('');
            } catch (err) {
                tableBody.innerHTML = '<tr><td colspan="8" style="text-align:center;color:#ef4444;">Error al cargar.</td></tr>';
            }
        }

        async function editDir(id) {
            try {
                const res = await fetch(`${API_BASE}/direcciones/${id}`);
                if (!res.ok) return;
                const d = await res.json();

                document.getElementById('editId').value = d.id;
                document.getElementById('calle').value = d.calle || '';
                document.getElementById('colonia').value = d.colonia || '';
                document.getElementById('numInterior').value = d.numInterior || '';
                document.getElementById('numExterior').value = d.numExterior || '';
                document.getElementById('municipio').value = d.municipio || '';
                document.getElementById('idPerfilUsuario').value = d.idPerfilUsuario || '';
                document.getElementById('formTitle').textContent = 'Editar Dirección';
                document.getElementById('submitBtn').textContent = 'Actualizar';
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } catch (err) {
                showAlert('Error al cargar dirección.', 'error');
            }
        }

        async function deleteDir(id) {
            if (!confirm('¿Eliminar esta dirección?')) return;
            try {
                const res = await fetch(`${API_BASE}/direcciones/${id}`, { method: 'DELETE' });
                const data = await res.json();
                if (res.ok) { showAlert(data.message, 'success'); loadDirecciones(); }
                else showAlert(data.message, 'error');
            } catch (err) {
                showAlert('Error de conexión.', 'error');
            }
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const calle = document.getElementById('calle').value.trim();
            if (!calle) { showAlert('La calle es requerida.', 'error'); return; }

            const body = {
                calle,
                colonia: document.getElementById('colonia').value.trim(),
                numInterior: document.getElementById('numInterior').value.trim(),
                numExterior: document.getElementById('numExterior').value.trim(),
                municipio: document.getElementById('municipio').value.trim(),
                idPerfilUsuario: parseInt(document.getElementById('idPerfilUsuario').value) || 0
            };

            const editId = document.getElementById('editId').value;
            const url = editId ? `${API_BASE}/direcciones/${editId}` : `${API_BASE}/direcciones`;
            const method = editId ? 'PUT' : 'POST';

            try {
                const res = await fetch(url, {
                    method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                const data = await res.json();
                if (res.ok) {
                    showAlert(data.message, 'success');
                    resetForm();
                    loadDirecciones();
                } else {
                    showAlert(data.message, 'error');
                }
            } catch (err) {
                showAlert('Error de conexión.', 'error');
            }
        });

        loadDirecciones();
    </script>
</body>
</html>
