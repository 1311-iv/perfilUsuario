<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roles - Sistema de Perfiles</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav>
        <span class="brand">Sistema de Perfiles</span>
        <a href="perfiles.html">Perfiles</a>
        <a href="perfil-form.html">Nuevo Perfil</a>
        <a href="direcciones.html">Direcciones</a>
        <a href="roles.html" class="active">Roles</a>
        <a href="usuarios.html">Usuarios</a>
        <a href="login.html">Salir</a>
    </nav>

    <div class="container">
        <h1>Gestión de Roles</h1>
        <div id="alert" class="alert"></div>

        <!-- FORMULARIO -->
        <div class="card">
            <h2 id="formTitle">Nuevo Rol</h2>
            <form id="rolForm">
                <input type="hidden" id="editId">
                <div class="form-row">
                    <div class="form-group">
                        <label for="strValor">Valor *</label>
                        <input type="text" id="strValor" maxlength="150" required>
                    </div>
                    <div class="form-group">
                        <label for="strDescripcion">Descripción</label>
                        <input type="text" id="strDescripcion" maxlength="350">
                    </div>
                </div>
                <div class="btn-group">
                    <button type="submit" class="btn btn-primary" id="submitBtn">Guardar</button>
                    <button type="button" class="btn btn-secondary" onclick="resetForm()">Cancelar</button>
                </div>
            </form>
        </div>

        <!-- BÚSQUEDA -->
        <div class="card">
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Buscar por nombre de rol...">
                <button class="btn btn-primary btn-sm" onclick="searchRoles()">Buscar</button>
                <button class="btn btn-secondary btn-sm" onclick="clearSearch()">Limpiar</button>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Valor</th>
                        <th>Descripción</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="4" style="text-align:center;">Cargando...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script>
        const form = document.getElementById('rolForm');
        const alertDiv = document.getElementById('alert');
        const tableBody = document.getElementById('tableBody');

        function showAlert(msg, type) {
            alertDiv.className = 'alert alert-' + type;
            alertDiv.textContent = msg;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function resetForm() {
            form.reset();
            document.getElementById('editId').value = '';
            document.getElementById('formTitle').textContent = 'Nuevo Rol';
            document.getElementById('submitBtn').textContent = 'Guardar';
        }

        async function loadRoles(nombre = '') {
            try {
                const query = nombre ? `?nombre=${encodeURIComponent(nombre)}` : '';
                const res = await fetch(`${API_BASE}/roles${query}`);
                const roles = await res.json();

                if (roles.length === 0) {
                    tableBody.innerHTML = '<tr><td colspan="4" style="text-align:center;">Sin resultados.</td></tr>';
                    return;
                }

                tableBody.innerHTML = roles.map(r => `
                    <tr>
                        <td>${r.id}</td>
                        <td>${r.strValor}</td>
                        <td>${r.strDescripcion || '—'}</td>
                        <td>
                            <button class="btn btn-sm btn-secondary" onclick="editRol(${r.id})">Editar</button>
                            <button class="btn btn-sm btn-danger" onclick="deleteRol(${r.id})">Eliminar</button>
                        </td>
                    </tr>
                `).join('');
            } catch (err) {
                tableBody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:#ef4444;">Error al cargar.</td></tr>';
            }
        }

        function searchRoles() {
            const val = document.getElementById('searchInput').value.trim();
            loadRoles(val);
        }

        function clearSearch() {
            document.getElementById('searchInput').value = '';
            loadRoles();
        }

        document.getElementById('searchInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') { e.preventDefault(); searchRoles(); }
        });

        async function editRol(id) {
            try {
                const res = await fetch(`${API_BASE}/roles/${id}`);
                if (!res.ok) return;
                const r = await res.json();

                document.getElementById('editId').value = r.id;
                document.getElementById('strValor').value = r.strValor || '';
                document.getElementById('strDescripcion').value = r.strDescripcion || '';
                document.getElementById('formTitle').textContent = 'Editar Rol';
                document.getElementById('submitBtn').textContent = 'Actualizar';
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } catch (err) {
                showAlert('Error al cargar rol.', 'error');
            }
        }

        async function deleteRol(id) {
            if (!confirm('¿Eliminar este rol?')) return;
            try {
                const res = await fetch(`${API_BASE}/roles/${id}`, { method: 'DELETE' });
                const data = await res.json();
                if (res.ok) { showAlert(data.message, 'success'); loadRoles(); }
                else showAlert(data.message, 'error');
            } catch (err) {
                showAlert('Error de conexión.', 'error');
            }
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const strValor = document.getElementById('strValor').value.trim();
            if (!strValor) { showAlert('El valor del rol es requerido.', 'error'); return; }

            const body = {
                strValor,
                strDescripcion: document.getElementById('strDescripcion').value.trim()
            };

            const editId = document.getElementById('editId').value;
            const url = editId ? `${API_BASE}/roles/${editId}` : `${API_BASE}/roles`;
            const method = editId ? 'PUT' : 'POST';

            try {
                const res = await fetch(url, {
                    method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                const data = await res.json();
                if (res.ok) {
                    showAlert(data.message, 'success');
                    resetForm();
                    loadRoles();
                } else {
                    showAlert(data.message, 'error');
                }
            } catch (err) {
                showAlert('Error de conexión.', 'error');
            }
        });

        loadRoles();
    </script>
</body>
</html>
